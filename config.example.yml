# Copy to config.yml and adjust. config.yml is gitignored (public repo).
window:
  default_days: 30
sources:
  github:
    include: []        # org/user logins; empty = all orgs the token can see
    exclude: []
  hetzner:
    account: ""        # label shown as the scope; hcloud tokens expose no project name
    include_projects: []
  claude_code: {}
